# BTC 4h RSI extreme-momentum experiment query
strategy: rsi_momentum
symbol: BTC-USDT
timeframe: 4h
parameters:
  rsi_period: 14
  rsi_upper: 70
  rsi_lower: 30
  rsi_exit: 50
backtest:
  fee_bps: 5
  slippage_bps: 2
  execution_lag_bars: 1
variants:
  - neutral-exit
  - extreme-zone
  - always-in
  - buy-and-hold
  - flat
  - mean-reversion
validation:
  train_start: "2021-01-01"
  train_end: "2024-12-31"
  test_start: "2025-01-01"
  test_end: "2026-05-01"

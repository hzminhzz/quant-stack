# RSI momentum multi-symbol generalization query
strategy: rsi_momentum
symbols: [BTC-USDT, ETH-USDT, BNB-USDT]
timeframe: 4h
champion_parameters:
  rsi_period: 14
  rsi_upper: 70
  rsi_lower: 30
  rsi_exit: 50
backtest:
  fee_bps: 5
  slippage_bps: 2
  execution_lag_bars: 1
trend_filter:
  id: trend_strength_filter
  params: { sma_period_fast: 20, sma_period_slow: 50 }
validation:
  train_split: 0.7
  walk_forward: true
